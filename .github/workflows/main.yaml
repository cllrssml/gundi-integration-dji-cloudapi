# Community fork: runs unit tests on push.
#
# The upstream template's build/deploy jobs (docker build to
# us-central1-docker.pkg.dev/cdip-78ca/gundi-integrations + terragrunt image
# bumps in PADAS/gundi-integrations-v2-infra) are disabled here -- they need
# PADAS org workload-identity vars and deploy keys we don't have. If PADAS
# ever wants to run this as its own integration type, those jobs can be
# restored from the upstream template: https://github.com/PADAS/gundi-integration-action-runner
name: Build integration
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release-**'

jobs:
  run_unit_tests:
    uses: ./.github/workflows/_tests.yml
