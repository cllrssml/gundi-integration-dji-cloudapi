name: Run tests
on:
  workflow_call

jobs:
  run_unit_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10' 
      - name: Install pip
        run: python -m ensurepip --upgrade
      - name: Install pip tools
        run: pip install pip-tools
      - name: Install compile dependencies
        run: pip-compile --output-file=requirements.txt requirements-base.in requirements-dev.in requirements.in
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt
      - name: Install the gundi-action-runner library (in-repo)
        run: pip install -e . --no-deps
      - name: Install CLI extras used by the test suite
        # Keep in sync with the `cli` extra in pyproject.toml — the CLI and
        # template tests import copier (which pulls jinja2/pyyaml with it).
        run: pip install "copier~=7.2" "pyyaml-include<2" "plumbum<1.10"
      - name: Run unit tests
        run: pytest
