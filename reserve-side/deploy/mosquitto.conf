# MQTTS listener the DJI RC connects to. Auth required, no anonymous access.
# Run as root so the broker can read the root-owned password file and the
# Let's Encrypt private key (0600 root, in a 700 root dir). Spike-acceptable.
user root

# Global auth (applies to every listener; avoids deprecated per_listener_settings).
password_file /mosquitto/config/passwd
allow_anonymous false

# TLS listener exposed to the internet (the RC / Pilot 2).
listener 8883
cafile   /etc/letsencrypt/live/__DOMAIN__/chain.pem
certfile /etc/letsencrypt/live/__DOMAIN__/fullchain.pem
keyfile  /etc/letsencrypt/live/__DOMAIN__/privkey.pem

# Local plaintext listener for capture_osd.py running ON the VM.
# Bind all container interfaces (Docker forwards to eth0, not container loopback);
# the compose host-side mapping 127.0.0.1:1883 keeps it off the internet.
listener 1883
