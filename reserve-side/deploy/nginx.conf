server {
    listen 443 ssl;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    # Pilot 2 loads this page from the "Open Platforms" URL. The path carries a
    # random secret (filled by setup.sh) because the page embeds the broker
    # credentials — everything else, including /, returns 404.
    location = /login-__LOGIN_SECRET__ {
        default_type text/html;
        alias /usr/share/nginx/html/login.html;
    }
    location / {
        return 404;
    }
}
